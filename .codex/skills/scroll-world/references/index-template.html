<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PRODUCT — PRIMARY PROMISE</title>
  <meta name="description" content="A plain-language statement of the problem and product answer." />
  <style>
    /* Theme the engine here. These match your generated scenes' background + palette. */
    :root, .sw-root {
      --sw-bg: #F5EDE0;          /* == the scene background colour */
      --sw-ink: #241d2b;
      --sw-ink-soft: #6a6072;
      --sw-accent: #9B7EBD;      /* per-section accents override this at runtime */
    }
  </style>
</head>
<body>
  <div id="top"></div>
  <div id="world"></div>

  <script src="scrub-engine.js"></script>
  <script>
    mountScrollWorld(document.getElementById('world'), {
      brand: { name: 'BRAND', href: '#top' },
      cta: { label: 'Get started', href: '#finale' },
      hint: 'scroll to explore',
      diveScroll: 1.3,
      connScroll: 0.9,
      sections: [
        // One object per scene, in order. `accent` colours the copy/route for that scene.
        // First section states the concrete problem and product answer. The page is
        // complete with stills alone; add clip paths only after returned videos pass QA.
        {
          id: 'sceneA', label: 'Scene A',
          still: 'assets/sceneA.webp',
          clip: null,
          accent: '#8FB98A',
          // scroll: 1.6, linger: 0.45,  // optional pacing: longer dwell; camera settles mid-scene
          eyebrow: 'The missed connection',
          title: 'A change can look complete.',
          body: 'Normal checks can pass while a distant section still needs review.',
          tags: ['Proof', 'Proof', 'Proof'],
        },
        // …middle scenes…
        {
          id: 'finale', label: 'The Product',
          still: 'assets/product.webp',
          clip: null,
          accent: '#9B7EBD',
          eyebrow: 'And it all pours into',
          title: 'One perfect thing.',
          body: 'The payoff sentence.',
          tags: [],
          cta: { primary: { label: 'Get started', href: '#' },
                 secondary: { label: 'See more', href: '#' } },
        },
      ],
      // Add only after the handoff returns approved connector videos.
      connectors: [],
    });
  </script>
</body>
</html>
