services:
  app:
    hostname: git-span
    extra_hosts:
      - "git-span:127.0.0.1"
    init: true
    cap_add:
      - SYS_TIME
      # Tailscale runs in TUN mode (real interface) so MagicDNS works system-wide.
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ${HOME}/devcontainer/git-span:/home/node:cached
    env_file:
      - .env
    environment:
      - NODE_OPTIONS=--max-old-space-size=8192
      - CLAUDE_CONFIG_DIR=/home/node/.claude
    # No dns: pin — `tailscale up --accept-dns` manages /etc/resolv.conf
    # (MagicDNS at 100.100.100.100, with split-DNS to upstreams).
    command: sleep infinity
