[package]
name = "git-mesh"
version = "1.0.90"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.102"
bincode = "1.3"
blake3 = "1"
regex = "1"
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
fs4 = "0.13"
clap_mangen = "0.2"
gix = { version = "0.81.0", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
gix-chunk = "0.7.1"
gix-lock = "21.0"
memmap2 = "0.9"
globset = "0.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10"
shell-words = "1.1"
similar = "2.7.0"
thiserror = "2.0.9"
tree-sitter = "0.22"
tree-sitter-rust = "0.21"
tree-sitter-typescript = "0.21"
uuid = { version = "1.23.1", features = ["v4"] }
tempfile = "3.27.0"
rkyv = "0.8"
rancor = "0.1"
toml = "0.8"
rusqlite = { version = "0.32", features = ["bundled"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
serde_json = "1.0.149"

[dev-dependencies]
assert_cmd = "2.0.16"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
gix = { version = "0.81.0", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
predicates = "3.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = "3.27.0"
uuid = { version = "1.23.1", features = ["v4"] }
which = "7"

[[bin]]
name = "git-mesh-test-helper"
path = "tests/helpers/test_helper.rs"
test = false
bench = false

# Codegen-only manpage generator: it has no unit tests, so building a test
# harness for it is pointless. It also adds a `bin "gen-manpage" test`
# target that needs full codegen (rlibs) of every dependency; when a
# `cargo check`/clippy pass (rmeta-only) and `cargo test` share this
# worktree's `target-cache/`, that target intermittently fails with
# "crate `…` required to be available in rlib format". Dropping the test
# harness removes the spurious target.
[[bin]]
name = "gen-manpage"
path = "src/bin/gen-manpage.rs"
test = false
bench = false

[[bench]]
name = "stale_head_only"
harness = false

[[bench]]
name = "stale_warm"
harness = false
