[package]
name = "git-mesh"
version = "1.0.49"
edition = "2024"
build = "build.rs"

[dependencies]
anyhow = "1.0.102"
regex = "1"
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
fs4 = "0.13"
clap_mangen = "0.2"
gix = { version = "0.81.0", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10"
similar = "2.7.0"
thiserror = "2.0.9"
tree-sitter = "0.22"
tree-sitter-rust = "0.21"
tree-sitter-typescript = "0.21"
uuid = { version = "1.23.1", features = ["v4"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
serde_json = "1.0.149"

[dev-dependencies]
assert_cmd = "2.0.16"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
gix = { version = "0.81.0", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
predicates = "3.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tempfile = "3.27.0"
uuid = { version = "1.23.1", features = ["v4"] }

[[bench]]
name = "stale_head_only"
harness = false
