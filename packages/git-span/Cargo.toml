[package]
name = "git-span"
version = "1.0.134"
edition = "2024"
build = "build.rs"

[features]
bench-corpus = []

[dependencies]
anyhow = "1.0.102"
bincode = "1.3"
blake3 = "1"
regex = "1"
chrono = { version = "0.4.44", features = ["serde"] }
clap = { version = "4.6.1", features = ["derive"] }
fs4 = "0.13"
clap_mangen = "0.2"
git-span-core = { path = "../git-span-core", features = ["serde"] }
gix = { version = "=0.84", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
gix-chunk = "0.7.1"
gix-lock = "23.0"
memmap2 = "0.9"
globset = "0.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
shell-words = "1.1"
similar = "2.7.0"
thiserror = "2.0.9"
tree-sitter = "0.22"
tree-sitter-rust = "0.21"
tree-sitter-typescript = "0.21"
uuid = { version = "1.23.1", features = ["v4"] }
tempfile = "3.27.0"
rkyv = "0.8"
rancor = "0.1"
toml = "0.8"
rusqlite = { version = "0.32", features = ["bundled"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
serde_json = "1.0.149"

[dev-dependencies]
assert_cmd = "2.0.16"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }
gix = { version = "=0.84", features = ["revision", "status", "sha1", "blame", "blob-diff"] }
predicates = "3.1.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10"
tempfile = "3.27.0"
uuid = { version = "1.23.1", features = ["v4"] }
which = "7"

[[bin]]
name = "git-span-test-helper"
path = "tests/helpers/test_helper.rs"
test = false
bench = false

# Codegen-only manpage generator: it has no unit tests, so building a test
# harness for it is pointless. It also adds a `bin "gen-manpage" test`
# target that needs full codegen (rlibs) of every dependency; when a
# `cargo check`/clippy pass (rmeta-only) and `cargo test` share the
# same target directory, that target intermittently fails with
# "crate `…` required to be available in rlib format". Dropping the test
# harness removes the spurious target.
#
# Defense in depth: every entry point (local yarn scripts, CI, sync) routes
# non-codegen tasks (check, clippy) and codegen tasks (test, build, run) into
# *separate* CARGO_TARGET_DIR trees — `git-span/check` vs `git-span/build` —
# so rmeta-only artifacts can never satisfy a fingerprint for a build that
# needs rlibs. `test = false` here plus that directory split eliminate the
# rlib/rmeta race.
#
# A SECOND, independent race also exists and needs its own mitigation: with
# default job parallelism, sibling rustc jobs intermittently abort with E0463
# "can't find crate for <dep>" (a different dep each run — bstr, serde, rustix,
# …) because a just-written rlib/rmeta is not yet visible to a concurrent
# reader job on the shared virtiofs target root. Every scripted cargo
# invocation therefore pins compilation to one job (CARGO_BUILD_JOBS=1 /
# nextest --build-jobs 1). Removing that serialization (card main-122) brought
# the race back. See scripts/cargo-build-system.md for the full rationale.
[[bin]]
name = "gen-manpage"
path = "src/bin/gen-manpage.rs"
test = false
bench = false

[[bench]]
name = "stale_head_only"
harness = false

[[bench]]
name = "stale_warm"
harness = false

[[bench]]
name = "real_corpus"
harness = false

[[bench]]
name = "size_sweep"
harness = false
required-features = ["bench-corpus"]

[[bin]]
name = "bench-corpus-gen"
path = "src/bin/bench-corpus-gen.rs"
test = false
bench = false
required-features = ["bench-corpus"]
