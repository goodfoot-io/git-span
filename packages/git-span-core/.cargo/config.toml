# Linux links run through git-span's mold cc wrapper (installed and verified in
# .devcontainer/Dockerfile; README "Linker (Linux only)" covers non-devcontainer installs).
[target.x86_64-unknown-linux-gnu]
linker = "../git-span/scripts/cc.mold-wrapper.sh"

[target.aarch64-unknown-linux-gnu]
linker = "../git-span/scripts/cc.mold-wrapper.sh"
